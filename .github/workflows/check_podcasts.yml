name: Check Podcast Activity

on:
  push:
    branches:
      - main
    paths:
      - 'List_of_podcast.md'
  schedule:
    # Run every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  check-podcasts:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run podcast activity check
        run: python check_active_podcasts.py

      - name: Run site activity check
        run: python check_active_sites.py

      - name: Commit updated reports
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add podcast_update.csv podcast_status.csv url_status.csv
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update podcast activity reports [skip ci]"
            git push || { echo "ERROR: git push failed"; exit 1; }
          fi
